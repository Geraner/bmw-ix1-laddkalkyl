name: Update exchange rates

on:
  workflow_dispatch:
  schedule:
    - cron: "30 17 * * 1-5"

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Fetch latest exchange rates
        run: node scripts/fetch-rates.mjs

      - name: Commit updated rates.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rates.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update exchange rates"
          git push
